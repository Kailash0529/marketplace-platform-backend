spring:
  cloud:
    gateway:
      routes:
        - id: cart-service
          uri: http://localhost:8089
          predicates:
            - Path=/cart/**
          filters:
            - PreserveHostHeader=true
          metadata:
            preserveRequestBody: true

        - id: order-service
          uri: http://localhost:8092
          predicates:
            - Path=/order/**
          filters:
            - PreserveHostHeader=true
          metadata:
            preserveRequestBody: true
